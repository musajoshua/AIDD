<section class="w-full bg-surface-container-low p-1 rounded-lg">
<form action="#" class="space-y-5" method="POST">
<div class="space-y-2">

</div>

<div class="flex justify-between items-center px-1">
<label class="block font-mono text-[11px] uppercase tracking-wider text-on-surface-variant" for="password">
                            Security Key
                        </label>
<a class="text-[11px] font-mono uppercase tracking-wider text-primary hover:text-primary-dim transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
